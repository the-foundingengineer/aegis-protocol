ompany\&#34;:\&#34;Meta\&#34;,\&#34;quote\&#34;:\&#34;We partnered with Scale AI to work with Enterprises to adopt Llama and train custom models with their own data. We are excited to collectively make Llama the industry standard and bring the benefits of AI to everyone.\&#34;,\&#34;logoModel\&#34;:\&#34;\&#34;,\&#34;logo\&#34;:{\&#34;url\&#34;:\&#34;/static/plasmic-assets/7094537ba442eae58f6b.svg\&#34;,\&#34;imageMeta\&#34;:{\&#34;width\&#34;:139,\&#34;height\&#34;:28}}},{\&#34;id\&#34;:\&#34;e4NVP9vAh5GWLeJAPudkrM\&#34;,\&#34;name\&#34;:\&#34;Demis Hassabis\&#34;,\&#34;position\&#34;:\&#34;CEO\&#34;,\&#34;company\&#34;:\&#34;Deepmind\&#34;,\&#34;quote\&#34;:\&#34;Great to see Gemini 1.5 pro top the new Scale SEAL leaderboard for adversarial robustness! Congrats to the entire Gemini team…and the AI safety team for leading the charge on building in robustness to our models as a core capability. Thanks to the Scale AI team for doing the vital work to create these rigorous benchmarks, the field needs more great work on topics like this\&#34;,\&#34;logoModel\&#34;:\&#34;\&#34;,\&#34;logo\&#34;:{\&#34;url\&#34;:\&#34;/static/plasmic-assets/0d10a03b2450e2259869.svg\&#34;,\&#34;imageMeta\&#34;:{\&#34;width\&#34;:141,\&#34;height\&#34;:33}}},{\&#34;id\&#34;:\&#34;qeuQnRZzbj5HGycnXHtNDo\&#34;,\&#34;name\&#34;:\&#34;Andrej Karpathy\&#34;,\&#34;position\&#34;:\&#34;Founder\&#34;,\&#34;company\&#34;:\&#34;EurekaLabsAI\&#34;,\&#34;quote\&#34;:\&#34;Nice, a serious contender to LMSYS in evaluating LLMs has entered the chat: SEAL Leaderboards. LLM evals are improving, but not so long ago their state was very bleak, with qualitative experience very often disagreeing with quantitative rankings.\\nGood evals are very difficult to build…They have to be comprehensive, representative, of high quality, and measure gradient signal, and there are a lot of details to think through and get right before your qualitative and quantitative assessments line up. …Good evals are unintuitively difficult, highly work-intensive, but quite important, so I&#39;m happy to see more organizations join the effort to do it well.\&#34;,\&#34;logoModel\&#34;:\&#34;\&#34;,\&#34;logo\&#34;:{\&#34;url\&#34;:\&#34;/static/plasmic-assets/278e0a80e9da2691dc5c.png\&#34;,\&#34;imageMeta\&#34;:{\&#34;width\&#34;:150,\&#34;height\&#34;:40}}},{\&#34;id\&#34;:\&#34;sCysDN2M1zBR5oRnvLnZjs\&#34;,\&#34;name\&#34;:\&#34;Nat Friedman\&#34;,\&#34;position\&#34;:\&#34;Entrepreneur and Investor\&#34;,\&#34;company\&#34;:\&#34;and Former CEO of GitHub\&#34;,\&#34;quote\&#34;:\&#34;We&#39;re going to need a lot more investment in high-quality evals and benchmarks to help us understand the actual comparative utility of the various models. This new set of private evals and leaderboards from Scale are great to see\&#34;,\&#34;logoModel\&#34;:\&#34;\&#34;,\&#34;logo\&#34;:{\&#34;url\&#34;:\&#34;/static/plasmic-assets/e8bfd0744c34b762f40b.svg\&#34;,\&#34;imageMeta\&#34;:{\&#34;width\&#34;:105,\&#34;height\&#34;:44}}}],\&#34;showAvatars\&#34;:false}]]}]}]]}]\n&#34;])
